# .goreleaser.yaml
# Docs: https://goreleaser.com/customization/
version: 2

project_name: xcaffold

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: xcaffold
    binary: xcaffold
    main: ./cmd/xcaffold
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 is not a common target for a dev CLI tool.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: xcaffold
    builds: [xcaffold]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: saero-ai
    name: xcaffold
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: xcaffold
    repository:
      owner: saero-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: xcaffold-bot
      email: bot@saero.ai
    commit_msg_template: "chore: bump xcaffold to {{ .Tag }}"
    homepage: "https://github.com/saero-ai/xcaffold"
    description: "Deterministic agent configuration compiler for AI coding platforms. Compile .xcf blueprints into native agent configurations."
    license: "Apache-2.0"
    install: |
      bin.install "xcaffold"
    test: |
      system "#{bin}/xcaffold", "--version"

scoops:
  - name: xcaffold
    repository:
      owner: saero-ai
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_author:
      name: xcaffold-bot
      email: bot@saero.ai
    commit_msg_template: "chore: bump xcaffold to {{ .Tag }}"
    homepage: "https://github.com/saero-ai/xcaffold"
    description: "Deterministic agent configuration compiler for AI coding platforms. Compile .xcf blueprints into native agent configurations."
    license: "Apache-2.0"
