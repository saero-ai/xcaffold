name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            if there is no further activity. If this issue is still relevant, please
            comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in
            7 days if there is no further activity. If you're still working on this,
            please comment or push new commits.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to reopen if it's
            still relevant.
          close-pr-message: >
            This pull request was closed due to inactivity. Feel free to reopen
            when you're ready to continue.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'keep-open,good first issue,P0-critical,P1-high'
          exempt-pr-labels: 'keep-open'
