name: Schema Sentinel (Fuzzer)

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  fuzz-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js for upstream dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install latest upstream Claude CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run Schema Sentinel Fuzzer
        run: |
          # The sentinel will parse claude's stderr and spit out internal/analyzer/schema-claude-latest.json
          go run tools/fuzzer/main.go
          mv schema-claude-latest.json internal/analyzer/

      - name: Check for schema drift
        id: git-check
        run: |
          git diff --exit-code internal/analyzer/schema-claude-latest.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(schema): automated nightly schema update from upstream fuzzer'
          title: '🚨 Fast-Follow: Upstream CLI Schema Changes Detected'
          body: |
            ## Schema Sentinel Alert
            The upstream `claude` CLI binary has silently modified its input parameters. 
            The fuzzing test detected structural drift and has auto-generated a perfectly typed update for the `xcaffold` core AST constraint engine.

            **Please review the changes in `schema-claude-latest.json`** to ensure deterministic deployments continue successfully.
          branch: 'automated/schema-sentinel'
          base: main
          labels: 'schema-drift, automated-pr'
