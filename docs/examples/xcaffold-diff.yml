# Example: xcaffold drift check in CI
#
# This workflow enforces that .claude/ files are never manually edited.
# It fails if a developer modifies any file in .claude/ directly instead
# of updating scaffold.xcf and re-running xcaffold apply.
#
# Setup:
# 1. Run `xcaffold apply` locally and commit scaffold.lock alongside scaffold.xcf.
# 2. Add this workflow to your repository.
# 3. CI will fail on any PR where scaffold.lock is stale or .claude/ drifts.
#
# Docs: https://github.com/saero-ai/xcaffold

name: xcaffold Drift Check

on:
  pull_request:
    paths:
      - "scaffold.xcf"
      - "scaffold.lock"
      - ".claude/**"

jobs:
  drift-check:
    name: Verify .claude/ matches scaffold.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install xcaffold
        run: go install github.com/saero-ai/xcaffold/cmd/xcaffold@latest

      - name: Run drift check
        run: xcaffold diff
        # Exit code 1 if any .claude/ file has been manually edited
        # or if scaffold.lock is out of date with scaffold.xcf.
