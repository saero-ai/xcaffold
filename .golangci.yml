run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - tools/

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  errcheck:
    exclude-functions:
      - io.Copy
      - (io.Closer).Close
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 5

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst
        - gocyclo
        - gosec

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocyclo
    - goconst
    - gofmt
    - unconvert
    - misspell
    - gosec
